apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 30m
  chart:
    spec:
      chart: nextcloud
      version: "9.0.3"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: nextcloud
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled

  dependsOn:
    - name: nextcloud-database
    
  values: #inside spec
    mariadb:
      enabled: false

    externalDatabase:
      enabled: true
      type: postgresql
      existingSecret: 
        enabled: true
        secretName: nextcloud-database-app # CNPG has predictable secret names
        usernameKey: username
        passwordKey: password
        hostKey: host
        databaseKey: dbname
    persistence:
      enabled: true
      existingClaim: nextcloud-app-pvc
      nextcloudData:
        enabled: true
        existingClaim: nextcloud-data-pvc
