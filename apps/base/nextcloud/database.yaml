apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nextcloud-database
spec:
  instances: 1

  storage:
    size: 1Gi

  imageName: ghcr.io/cloudnative-pg/postgresql:18.1-system-trixie

  bootstrap:
    initdb:
      database: nextcloud            # This triggers secret creation for this DB
      owner: app   
