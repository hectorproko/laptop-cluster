apiVersion: apps/v1
kind: Deployment
metadata:
  name: timetagger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timetagger
  template:
    metadata:
      labels:
        app: timetagger
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000  # This helps with Volume permissions
      containers:
      - name: timetagger
        image: ghcr.io/almarklein/timetagger:v26.1.3-nonroot
        ports:
        - containerPort: 80
        env:
        - name: TIMETAGGER_BIND
          value: "0.0.0.0:80"
        - name: TIMETAGGER_DATADIR
          value: "/home/timetagger/_timetagger"
        - name: TIMETAGGER_LOG_LEVEL
          value: "info"
        - name: TIMETAGGER_CREDENTIALS
          value: "test:$2a$08$zMsjPEGdXHzsu0N/felcbuWrffsH4.4ocDWY5oijsZ0cbwSiLNA8."
        volumeMounts:
        - name: data
          mountPath: /home/timetagger/_timetagger
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: timetagger-data