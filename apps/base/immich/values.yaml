valkey:
  enabled: true

immich:
  env:
    DB_HOSTNAME: immich-database-rw          # Primary read-write service from CloudNativePG
    DB_PORT: "5432"                        # Usually not needed (default 5432)
    DB_USERNAME:
      valueFrom:
        secretKeyRef:
          name: immich-database-app
          key: user
    DB_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: immich-database-app
          key: password
    DB_DATABASE_NAME:
      valueFrom:
        secretKeyRef:
          name: immich-database-app
          key: dbname

  persistence:
    library:
      existingClaim: immich-library-pvc